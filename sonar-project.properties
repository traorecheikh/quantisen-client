sonar.projectKey=gestion-boisson-frontend
sonar.organization=your-org-key
sonar.projectName=Gestion Boisson Frontend
sonar.projectVersion=1.0

# Source code
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.test.ts

# Test coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/main.ts

# Language
sonar.sourceEncoding=UTF-8
